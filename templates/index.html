<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SamBot Dashboard</title>
    <style>
        :root {
            color-scheme: dark;
            --bg: #0d1321;
            --panel: #172033;
            --panel-soft: #101827;
            --border: #2b3851;
            --text: #f6f7fb;
            --muted: #97a3b8;
            --blue: #5f7cff;
            --green: #32c77f;
            --green-soft: rgba(50, 199, 127, 0.12);
            --red: #ff6b6b;
            --red-soft: rgba(255, 107, 107, 0.12);
            --info: #4ba3ff;
            --info-soft: rgba(75, 163, 255, 0.12);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            background:
                radial-gradient(circle at 20% 20%, rgba(95, 124, 255, 0.18), transparent 32%),
                linear-gradient(135deg, #0d1321 0%, #121a2a 48%, #101827 100%);
            color: var(--text);
            font-family: "Segoe UI", "Trebuchet MS", sans-serif;
        }

        .dashboard {
            width: min(100%, 640px);
            background: rgba(23, 32, 51, 0.94);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 28px;
            box-shadow: 0 24px 70px rgba(0, 0, 0, 0.36);
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            padding-bottom: 18px;
            margin-bottom: 24px;
            border-bottom: 1px solid var(--border);
        }

        h1 {
            margin: 0;
            font-size: clamp(28px, 6vw, 40px);
            line-height: 1;
        }

        .status-pill {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 7px 10px;
            border: 1px solid rgba(50, 199, 127, 0.35);
            border-radius: 999px;
            color: #79e6ad;
            background: var(--green-soft);
            font-size: 12px;
            font-weight: 700;
        }

        .pulse {
            width: 8px;
            height: 8px;
            border-radius: 999px;
            background: var(--green);
            box-shadow: 0 0 0 5px rgba(50, 199, 127, 0.12);
        }

        .stack {
            display: grid;
            gap: 14px;
            margin-bottom: 18px;
        }

        .section {
            padding: 16px;
            background: rgba(16, 24, 39, 0.78);
            border: 1px solid rgba(43, 56, 81, 0.75);
            border-radius: 8px;
        }

        .label {
            display: block;
            margin-bottom: 7px;
            color: var(--muted);
            font-size: 12px;
            font-weight: 800;
            letter-spacing: 0;
            text-transform: uppercase;
        }

        .value {
            margin: 0;
            font-size: 17px;
            font-weight: 750;
        }

        .verse {
            color: #dbe3f7;
            font-style: italic;
        }

        .form-row {
            display: grid;
            grid-template-columns: minmax(0, 1fr) auto;
            gap: 10px;
        }

        input {
            width: 100%;
            min-width: 0;
            padding: 12px 13px;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: #0b111f;
            color: var(--text);
            font: inherit;
            outline: none;
        }

        input:focus {
            border-color: var(--blue);
            box-shadow: 0 0 0 3px rgba(95, 124, 255, 0.2);
        }

        .note {
            margin: 10px 0 0;
            color: var(--muted);
            font-size: 12px;
        }

        .actions {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 10px;
        }

        button {
            border: 0;
            border-radius: 8px;
            padding: 12px 14px;
            color: white;
            font: inherit;
            font-weight: 800;
            cursor: pointer;
            transition: transform 160ms ease, filter 160ms ease;
        }

        button:hover {
            filter: brightness(1.08);
            transform: translateY(-1px);
        }

        .btn-secondary {
            background: #33425f;
        }

        .btn-primary {
            background: var(--blue);
        }

        .btn-success {
            background: #20a86a;
            white-space: nowrap;
        }

        .alert,
        .code-panel,
        .screen-panel {
            margin-top: 18px;
            padding: 16px;
            border-radius: 8px;
        }

        .alert.info {
            background: var(--info-soft);
            color: #9ccfff;
            border: 1px solid rgba(75, 163, 255, 0.3);
        }

        .alert.success {
            background: var(--green-soft);
            color: #93edbd;
            border: 1px solid rgba(50, 199, 127, 0.3);
        }

        .alert.error {
            background: var(--red-soft);
            color: #ffadad;
            border: 1px solid rgba(255, 107, 107, 0.3);
        }

        .code-panel {
            background: var(--green-soft);
            border: 1px solid rgba(50, 199, 127, 0.3);
        }

        #pairing-code {
            margin: 0;
            font-size: clamp(30px, 8vw, 44px);
            font-weight: 900;
            letter-spacing: 0;
            overflow-wrap: anywhere;
        }

        .screen-panel {
            background: #0b111f;
            border: 1px solid var(--border);
        }

        #qr-image {
            display: block;
            max-width: 100%;
            margin: 0 auto;
            border: 1px solid var(--border);
            border-radius: 8px;
        }

        .hidden {
            display: none !important;
        }

        @media (max-width: 560px) {
            body {
                padding: 14px;
                align-items: flex-start;
            }

            .dashboard {
                padding: 20px;
            }

            .header,
            .form-row,
            .actions {
                grid-template-columns: 1fr;
                flex-direction: column;
                align-items: flex-start;
            }

            .btn-success {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <main class="dashboard">
        <div class="header">
            <h1>SamBot</h1>
            <span class="status-pill"><span class="pulse"></span> Active</span>
        </div>

        <div class="stack">
            <section class="section">
                <span class="label">Current Target Chat</span>
                <p class="value">{{ target }}</p>
            </section>

            <section class="section">
                <span class="label">Scheduled Dispatch Time</span>
                <p class="value">Every Morning @ 4:00 AM</p>
            </section>

            <section class="section">
                <span class="label">Today's Scheduled Liturgical Verse</span>
                <p class="value verse">"{{ verse }}"</p>
            </section>
        </div>

        <section class="section">
            <label for="phone-number" class="label">WhatsApp Phone Number</label>
            <div class="form-row">
                <input id="phone-number" type="tel" inputmode="tel" autocomplete="tel" placeholder="+254712345678">
                <button onclick="linkWithPhone()" class="btn-success">Generate Code</button>
            </div>
            <p class="note">Only link a WhatsApp account you control.</p>
        </section>

        <div class="actions" style="margin-top: 14px;">
            <button onclick="runAction('/scan-qr')" class="btn-secondary">Link WhatsApp Session</button>
            <button onclick="runAction('/trigger-now')" class="btn-primary">Send Manually Now</button>
        </div>

        <div id="status-box" class="alert hidden"></div>

        <div id="code-box" class="code-panel hidden">
            <span class="label">Pairing Code</span>
            <p id="pairing-code"></p>
        </div>

        <div id="qr-box" class="screen-panel hidden">
            <span id="qr-title" class="label">WhatsApp Screen</span>
            <img id="qr-image" alt="WhatsApp screen">
        </div>
    </main>

    <script>
        function resetOutput(message) {
            const box = document.getElementById('status-box');
            box.className = "alert info";
            box.innerText = message || "Processing request... please wait.";
            box.classList.remove('hidden');

            const qrBox = document.getElementById('qr-box');
            const qrImage = document.getElementById('qr-image');
            const codeBox = document.getElementById('code-box');
            const pairingCode = document.getElementById('pairing-code');
            qrBox.classList.add('hidden');
            qrImage.src = '';
            codeBox.classList.add('hidden');
            pairingCode.innerText = '';
        }

        function showResult(data) {
            const box = document.getElementById('status-box');
            const qrBox = document.getElementById('qr-box');
            const qrImage = document.getElementById('qr-image');
            const codeBox = document.getElementById('code-box');
            const pairingCode = document.getElementById('pairing-code');

            if(data.status === 'success') {
                box.className = "alert success";
                box.innerText = "Success: " + data.message;
                if(data.code) {
                    pairingCode.innerText = data.code;
                    codeBox.classList.remove('hidden');
                }
                if(data.screenshot) {
                    qrImage.src = data.screenshot;
                    qrBox.classList.remove('hidden');
                }
            } else {
                box.className = "alert error";
                box.innerText = "Error: " + data.message;
            }
        }

        function showConnectionError(err) {
            const box = document.getElementById('status-box');
            box.className = "alert error";
            box.innerText = "Connection lost: " + err;
        }

        function runAction(endpoint) {
            resetOutput(endpoint === '/scan-qr' ? "Capturing WhatsApp screen..." : "Processing request... please wait.");
            document.getElementById('qr-title').innerText = "WhatsApp Screen";

            fetch(endpoint, { method: endpoint === '/trigger-now' ? 'POST' : 'GET' })
                .then(res => res.json())
                .then(showResult)
                .catch(showConnectionError);
        }

        function linkWithPhone() {
            const phoneNumber = document.getElementById('phone-number').value.trim();
            if(!phoneNumber) {
                resetOutput("Enter a WhatsApp phone number first.");
                document.getElementById('status-box').className = "alert error";
                return;
            }

            document.getElementById('qr-title').innerText = "WhatsApp Screen";
            resetOutput("Generating WhatsApp pairing code...");

            fetch('/link-phone', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ phone_number: phoneNumber })
            })
                .then(res => res.json())
                .then(showResult)
                .catch(showConnectionError);
        }
    </script>
</body>
</html>
