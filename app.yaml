name: sambot
region: nyc
services:
  - name: sambot-web
    run_command: "gunicorn app:app --bind 0.0.0.0:5000 --workers 1"
    dockerfile_path: Dockerfile
    http_port: 5000
    instance_size_slug: basic-xxs
    instance_count: 1
    environment_slug: python
    envs:
      - key: PLAYWRIGHT_HEADLESS
        value: "1"
      - key: FLASK_DEBUG
        value: "0"
    git:
      repo_clone_url: "https://github.com/<your-username>/<your-repo>.git"
      branch: main
